name: ${COMPOSE_PROJECT_NAME:-robotics-project}

services:
  ros2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ${BUILD_TARGET}
    image: robotics-project:${BUILD_TARGET}
    tty: true
    profiles: ["cpu"]
    environment:
      - DISPLAY=${DISPLAY_CONFIG}
      - QT_X11_NO_MITSHM=1
    volumes:
      # --- Source Code (Synced with Host) ---
      # Mount the host project root inside the workspace's src/ as a single
      # subdirectory so colcon picks up sim_bot (and any other packages under src/).
      - ..:/home/ubuntu/ros2_workspaces/src/robotics_project:delegated

      # --- Build Artifacts (Persisted in Docker, kept off Host) ---
      # Prevents root-owned files on the host and speeds up IO on Windows/Mac.
      - ros2_build:/home/ubuntu/ros2_workspaces/build
      - ros2_install:/home/ubuntu/ros2_workspaces/install
      - ros2_log:/home/ubuntu/ros2_workspaces/log

      # --- System / Hardware ---
      - /dev:/dev
      - /sys:/sys
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: ${NETWORK_MODE_CONFIG}
    privileged: true
    working_dir: /home/ubuntu/ros2_workspaces
    command: sleep infinity
    depends_on:
      init-bootstrap:
        condition: service_completed_successfully

  ros2-nvidia:
    extends:
      service: ros2
    environment:
      - DISPLAY=${DISPLAY_CONFIG}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, graphics, compute, utility]
    profiles: ["nvidia"]

  ros2-amd:
    extends:
      service: ros2
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    profiles: ["amd"]

  # One-shot init to chown all volumes so the ubuntu user (UID 1000) can write
  # to them. Runs before the ros2 service starts, exits when done.
  init-bootstrap:
    build:
      context: ..
      dockerfile: docker/Dockerfile.init-bootstrap
    user: root
    volumes:
      - ros2_build:/ros2_build
      - ros2_install:/ros2_install
      - ros2_log:/ros2_log
    restart: "no"

# Build artifact volumes
volumes:
  ros2_build:
  ros2_install:
  ros2_log:
