ekf_filter_node:
  ros__parameters:
    use_sim_time: false
    frequency: 20.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odometry on /odom — trust linear velocity (vx) only.
    # If your odom publisher also broadcasts the odom->base_link TF,
    # disable that on its end so this EKF is the only TF publisher.
    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 5

    # IMU on /imu/data — trust gyro yaw rate (vyaw) only.
    # Gyro+accel only (no magnetometer) — orientation absolute is unreliable, so
    # we don't fuse it. Accel at rest integrates into drift.
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 3
    imu0_remove_gravitational_acceleration: false
