ekf_filter_node:
  ros__parameters:
    use_sim_time: false
    frequency: 10.0              # was 20 — matches odom publish rate
    sensor_timeout: 0.5          # was 0.1 — less aggressive timeout
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 2          # was 5 — only keep latest

    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 2           # was 3
    imu0_remove_gravitational_acceleration: false